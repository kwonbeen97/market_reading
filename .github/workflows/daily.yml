name: Daily Market Data

on:
  schedule:
    - cron: '0 7 * * 1-5'    # UTC 07:00 = 한국 16:00 (코스피 마감 후)
    - cron: '0 22 * * 1-5'   # UTC 22:00 = 한국 07:00 (나스닥 마감 후 ~2시간)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run fetch_data.py
        run: python fetch_data.py

      - name: Commit & Push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market_data.json history/
          git diff --cached --quiet || git commit -m "chore: daily market data $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Trigger Render deploy
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}" || echo "Render hook 없음"
